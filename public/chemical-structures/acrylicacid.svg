<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <!-- Background -->
  <rect width="100%" height="100%" fill="white"/>
  
  <!-- Acrylic Acid Molecule: CH2=CH-COOH -->
  <g transform="translate(80, 40)">
    <!-- CH2= -->
    <circle cx="50" cy="120" r="18" fill="#333333"/>
    <text x="50" y="127" text-anchor="middle" fill="white" font-size="16" font-weight="bold">CH₂</text>
    
    <!-- Double bond to CH -->
    <line x1="65" y1="115" x2="110" y2="115" stroke="#1a1a1a" stroke-width="3"/>
    <line x1="65" y1="125" x2="110" y2="125" stroke="#1a1a1a" stroke-width="3"/>
    
    <!-- CH -->
    <circle cx="125" cy="120" r="18" fill="#333333"/>
    <text x="125" y="127" text-anchor="middle" fill="white" font-size="16" font-weight="bold">CH</text>
    
    <!-- Single bond to COOH -->
    <line x1="125" y1="120" x2="170" y2="120" stroke="#1a1a1a" stroke-width="3"/>
    
    <!-- Carboxyl Group -->
    <!-- C -->
    <circle cx="185" cy="120" r="18" fill="#333333"/>
    <text x="185" y="127" text-anchor="middle" fill="white" font-size="20" font-weight="bold">C</text>
    
    <!-- Double bond to O (top) -->
    <line x1="180" y1="105" x2="180" y2="70" stroke="#1a1a1a" stroke-width="3"/>
    <line x1="190" y1="105" x2="190" y2="70" stroke="#1a1a1a" stroke-width="3"/>
    
    <!-- O (top) -->
    <circle cx="185" cy="60" r="18" fill="#e74c3c"/>
    <text x="185" y="67" text-anchor="middle" fill="white" font-size="20" font-weight="bold">O</text>
    
    <!-- Single bond to OH (right) -->
    <line x1="200" y1="120" x2="230" y2="120" stroke="#1a1a1a" stroke-width="3"/>
    
    <!-- OH -->
    <circle cx="245" cy="120" r="18" fill="#e74c3c"/>
    <text x="245" y="127" text-anchor="middle" fill="white" font-size="16" font-weight="bold">OH</text>
  </g>
  
  <!-- Formula -->
  <text x="200" y="270" text-anchor="middle" fill="#1a1a1a" font-size="24" font-weight="bold">C₃H₄O₂</text>
  
  <!-- Name -->
  <text x="200" y="30" text-anchor="middle" fill="#1a1a1a" font-size="18" font-weight="bold">Acrylic Acid</text>
</svg>
