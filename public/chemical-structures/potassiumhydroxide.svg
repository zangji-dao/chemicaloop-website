<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <!-- Background -->
  <rect width="100%" height="100%" fill="white"/>
  
  <!-- Potassium Hydroxide Molecule: K+ + OH- -->
  <g transform="translate(80, 40)">
    <!-- Potassium Ion K+ -->
    <circle cx="120" cy="120" r="40" fill="#9b59b6" opacity="0.3"/>
    <circle cx="120" cy="120" r="30" fill="#9b59b6"/>
    <text x="120" y="130" text-anchor="middle" fill="white" font-size="28" font-weight="bold">K</text>
    <text x="140" y="110" text-anchor="middle" fill="#9b59b6" font-size="18" font-weight="bold">+</text>
    
    <!-- Ionic Bond (dashed line) -->
    <line x1="150" y1="120" x2="210" y2="120" stroke="#95a5a6" stroke-width="2" stroke-dasharray="5,5"/>
    
    <!-- Hydroxide Ion OH- -->
    <!-- O -->
    <circle cx="240" cy="120" r="25" fill="#e74c3c"/>
    <text x="240" y="130" text-anchor="middle" fill="white" font-size="24" font-weight="bold">O</text>
    
    <!-- H -->
    <line x1="260" y1="120" x2="285" y2="120" stroke="#1a1a1a" stroke-width="3"/>
    <circle cx="300" cy="120" r="18" fill="#333333"/>
    <text x="300" y="127" text-anchor="middle" fill="white" font-size="18" font-weight="bold">H</text>
    
    <!-- Negative charge -->
    <text x="225" y="105" text-anchor="middle" fill="#e74c3c" font-size="18" font-weight="bold">-</text>
  </g>
  
  <!-- Formula -->
  <text x="200" y="270" text-anchor="middle" fill="#1a1a1a" font-size="24" font-weight="bold">KOH</text>
  
  <!-- Name -->
  <text x="200" y="30" text-anchor="middle" fill="#1a1a1a" font-size="18" font-weight="bold">Potassium Hydroxide</text>
</svg>
