<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <!-- Background -->
  <rect width="100%" height="100%" fill="white"/>
  
  <!-- Ethylene Glycol Molecule: HO-CH2-CH2-OH -->
  <g transform="translate(60, 50)">
    <!-- Left OH -->
    <circle cx="50" cy="100" r="18" fill="#333333"/>
    <text x="50" y="107" text-anchor="middle" fill="white" font-size="16" font-weight="bold">H</text>
    
    <!-- Bond to O -->
    <line x1="50" y1="100" x2="80" y2="100" stroke="#1a1a1a" stroke-width="3"/>
    
    <!-- Left O -->
    <circle cx="100" cy="100" r="18" fill="#e74c3c"/>
    <text x="100" y="107" text-anchor="middle" fill="white" font-size="20" font-weight="bold">O</text>
    
    <!-- Bond to CH2 -->
    <line x1="100" y1="100" x2="150" y2="100" stroke="#1a1a1a" stroke-width="3"/>
    
    <!-- Left CH2 -->
    <circle cx="170" cy="100" r="18" fill="#333333"/>
    <text x="170" y="107" text-anchor="middle" fill="white" font-size="16" font-weight="bold">CH₂</text>
    
    <!-- Bond to CH2 -->
    <line x1="170" y1="100" x2="220" y2="100" stroke="#1a1a1a" stroke-width="3"/>
    
    <!-- Right CH2 -->
    <circle cx="240" cy="100" r="18" fill="#333333"/>
    <text x="240" y="107" text-anchor="middle" fill="white" font-size="16" font-weight="bold">CH₂</text>
    
    <!-- Bond to O -->
    <line x1="240" y1="100" x2="270" y2="100" stroke="#1a1a1a" stroke-width="3"/>
    
    <!-- Right O -->
    <circle cx="290" cy="100" r="18" fill="#e74c3c"/>
    <text x="290" y="107" text-anchor="middle" fill="white" font-size="20" font-weight="bold">O</text>
    
    <!-- Bond to H -->
    <line x1="290" y1="100" x2="320" y2="100" stroke="#1a1a1a" stroke-width="3"/>
    
    <!-- Right H -->
    <circle cx="330" cy="100" r="18" fill="#333333"/>
    <text x="330" y="107" text-anchor="middle" fill="white" font-size="16" font-weight="bold">H</text>
  </g>
  
  <!-- Formula -->
  <text x="200" y="270" text-anchor="middle" fill="#1a1a1a" font-size="24" font-weight="bold">C₂H₆O₂</text>
  
  <!-- Name -->
  <text x="200" y="30" text-anchor="middle" fill="#1a1a1a" font-size="18" font-weight="bold">Ethylene Glycol</text>
</svg>
